<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產業價值鏈瀏覽器</title>
<style>
  :root{
    --navy:#13233f;
    --navy-2:#1c3258;
    --bg:#f2f4f8;
    --card:#ffffff;
    --line:#dde3ee;
    --up:#2563eb;     /* 上游 blue */
    --mid:#0d9488;    /* 中游 teal */
    --down:#d97706;   /* 下游 amber */
    --quart:#7c3aed;  /* 第4組 purple */
    --quint:#db2777;  /* 第5組 pink */
    --stock-up:#dc2626;     /* 股價上漲 紅色 */
    --stock-up-bg:#fef2f2;
    --stock-up-border:#fca5a5;
    --stock-down:#16a34a;   /* 股價下跌 綠色 */
    --stock-down-bg:#f0fdf4;
    --stock-down-border:#86efac;
    --stock-flat:#6b7382;
    --text:#1a1f2b;
    --muted:#6b7382;
    --link:#1d4ed8;
    --chip:#eef1f7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff;
    padding:22px 20px 18px;
  }
  header h1{
    margin:0 0 4px;
    font-size:20px;
    letter-spacing:.5px;
  }
  header p{
    margin:0;
    font-size:12.5px;
    color:#c7d2e8;
  }
  .industry-bar{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 16px;
    background:#fff;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    z-index:5;
  }
  .industry-chip{
    flex:0 0 auto;
    padding:7px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--chip);
    font-size:13px;
    cursor:pointer;
    color:var(--text);
    white-space:nowrap;
    transition:.15s;
  }
  .industry-chip.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }
  main{
    max-width:1180px;
    margin:0 auto;
    padding:20px 16px 60px;
  }
  .placeholder{
    background:#fff;
    border:1px dashed var(--line);
    border-radius:14px;
    padding:40px 24px;
    text-align:center;
    color:var(--muted);
    line-height:1.8;
  }
  .placeholder a{color:var(--link);}
  .chain{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:14px;
    margin-bottom:18px;
  }
  .lane{
    background:var(--card);
    border-radius:14px;
    border:1px solid var(--line);
    overflow:hidden;
  }
  .lane-head{
    padding:10px 14px;
    font-size:13px;
    font-weight:700;
    color:#fff;
    letter-spacing:1px;
  }
  .lane.up .lane-head{background:var(--up);}
  .lane.mid .lane-head{background:var(--mid);}
  .lane.down .lane-head{background:var(--down);}
  .lane.quart .lane-head{background:var(--quart);}
  .lane.quint .lane-head{background:var(--quint);}
  .lane-body{padding:10px;display:flex;flex-direction:column;gap:8px;}
  .node-btn{
    text-align:left;
    border:1px solid var(--line);
    background:#fff;
    border-radius:10px;
    padding:10px 12px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    color:var(--text);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    transition:.15s;
  }
  .node-btn:hover{border-color:var(--navy);}
  .node-btn.active{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }
  .node-btn .count{
    font-size:11.5px;
    font-weight:500;
    color:var(--muted);
  }
  .node-btn.active .count{color:#c7d2e8;}

  .detail{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .detail-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    background:#f8f9fc;
  }
  .detail-head h2{margin:0;font-size:16px;}
  .detail-head .total-badge{
    font-size:12px;
    background:var(--chip);
    border-radius:999px;
    padding:4px 10px;
    color:var(--muted);
  }
  .detail-grid{
    display:grid;
    grid-template-columns:220px 1fr;
  }
  @media (max-width:700px){
    .detail-grid{grid-template-columns:1fr;}
  }
  .subcat-list{
    border-right:1px solid var(--line);
    max-height:560px;
    overflow-y:auto;
  }

    border-bottom:1px solid #f0f2f7;
    display:flex;
    justify-content:space-between;
  }

  .subcat-item.active{
    background:#eef3ff;
    color:var(--navy);
    font-weight:700;
    border-left:3px solid var(--up);
  }
  .subcat-item .n{color:var(--muted);font-weight:400;font-size:12px;}

  .companies{padding:16px 18px;max-height:560px;overflow-y:auto;}
  .group{margin-bottom:16px;}
  .group:last-child{margin-bottom:0;}
  .group-title{
    font-size:12.5px;
    font-weight:700;
    color:var(--muted);
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:6px;

  .pills{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{

    background:#fafbfd;
    border-radius:8px;
    padding:6px 10px;
    font-size:13px;
    text-decoration:none;
    color:var(--text);

  .pill:hover{

    color:var(--link);

  .pill.stock-down{

    align-items:center;

    gap:10px;

  <span id="stockStatusText">尚未載入股價資料</span>

</div>

<main id="main"></main>

<footer>
  資料為靜態快照，非即時連動原網站；公司名稱可點擊查詢個股基本資料或外國企業官網。
</footer>

<script>
/* ---------- helpers to keep data compact ---------- */
function D(str){ // domestic, "name|stk_code,name|stk_code"
  if(!str) return [];
  return str.split(',').map(p=>{
    const [name,code]=p.split('|');
    return {name, code, url:`https://ic.tpex.org.tw/company_basic.php?stk_code=${code}`};
  });
}
function F(str){ // foreign, "name|url,name|url"
  if(!str) return [];
  return str.split(',').map(p=>{
    const [name,url]=p.split('|');
    return {name, url};
  });
}
function groups(arr){ return arr.filter(g=>g.items && g.items.length); }

/* ---------- 股價漲跌幅資料抓取 ---------- */
let stockQuotes = {};       // { "2330": {close, change, changePercent} }
let stockQuotesDate = '';
let stockQuotesLoading = false;

// CORS 代理清單，依序嘗試（mis.twse.com.tw 即時看盤頁不開放跨網域，改用官方開放資料 + 代理備援）
const CORS_PROXIES = [
  url => url, // 先嘗試直連（部分開放資料平台有開 CORS）
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://corsproxy.io/?url=' + encodeURIComponent(url)
];

async function fetchJsonWithFallback(url){
  let lastErr;
  for(const wrap of CORS_PROXIES){
    try{
      const resp = await fetch(wrap(url), { cache:'no-store' });
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      const text = await resp.text();
      return JSON.parse(text);
    }catch(e){ lastErr = e; }
  }
  throw lastErr;
}

function pickNum(obj, keys){
  for(const k of keys){
    if(obj[k]!==undefined && obj[k]!==null && obj[k]!==''){
      const v = parseFloat(String(obj[k]).replace(/[, ]/g,''));
      if(!isNaN(v)) return v;
    }
  }
  return NaN;
}
function pickStr(obj, keys){
  for(const k of keys){
    if(obj[k]!==undefined && obj[k]!==null && String(obj[k]).trim()!=='') return String(obj[k]).trim();
  }
  return '';
}

async function tryLoadLocalSnapshot(){
  // 優先嘗試讀取同網域底下的 stock_quotes.json（用 update_stock_quotes.js 產生）
  // 同網域請求不受 CORS / file:// 限制影響，是最穩定的方式
  try{
    const resp = await fetch('./stock_quotes.json', { cache:'no-store' });
    if(!resp.ok) return null;
    const data = await resp.json();
    if(!data || typeof data.quotes !== 'object') return null;
    return data;
  }catch(e){
    return null; // 找不到檔案或讀取失敗，靜默轉去下一個方法
  }
}

async function loadStockQuotes(){
  if(stockQuotesLoading) return;
  stockQuotesLoading = true;
  const btn = document.getElementById('stockRefreshBtn');
  const statusText = document.getElementById('stockStatusText');
  if(btn) btn.disabled = true;
  if(statusText) statusText.textContent = '股價資料載入中…';

  const newQuotes = {};
  let tseCount = 0, otcCount = 0;
  let errMsgs = [];
  let source = '';

  // 方法一：讀取本機產生的 stock_quotes.json（同網域，最穩定，建議用法）
  const localSnap = await tryLoadLocalSnapshot();
  if(localSnap){
    Object.keys(localSnap.quotes).forEach(code=>{
      newQuotes[code] = localSnap.quotes[code];
    });
    tseCount = localSnap.tseCount || 0;
    otcCount = localSnap.otcCount || 0;
    source = `本機快照（更新於 ${localSnap.updatedAtLocal || localSnap.updatedAt || '未知時間'}）`;
  } else {
    // 方法二：找不到本機快照檔，退回直接連線官方開放資料（受瀏覽器 CORS / file:// 限制影響，不保證成功）
    if(statusText) statusText.textContent = '找不到本機股價快照，嘗試直接連線官方資料（可能會被瀏覽器擋下）…';
    try{
      const tseData = await fetchJsonWithFallback('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
      if(Array.isArray(tseData)){
        tseData.forEach(row=>{
          const code = pickStr(row, ['Code','code','證券代號']);
          const close = pickNum(row, ['ClosingPrice','close','收盤價']);
          const change = pickNum(row, ['Change','change','漲跌價差']);
          if(!code || isNaN(close) || isNaN(change)) return;
          const prevClose = close - change;
          if(prevClose<=0) return;
          newQuotes[code] = { close, change, changePercent: (change/prevClose)*100 };
          tseCount++;
        });
      }
    }catch(e){ errMsgs.push('上市資料載入失敗'); console.error('TSE fetch error', e); }

    try{
      const otcData = await fetchJsonWithFallback('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes');
      if(Array.isArray(otcData)){
        otcData.forEach(row=>{
          const code = pickStr(row, ['Code','SecuritiesCompanyCode','code','代號']);
          const close = pickNum(row, ['Close','ClosingPrice','close','收盤']);
          const change = pickNum(row, ['Change','change','漲跌']);
          if(!code || isNaN(close) || isNaN(change)) return;
          const prevClose = close - change;
          if(prevClose<=0) return;
          if(!newQuotes[code]){
            newQuotes[code] = { close, change, changePercent: (change/prevClose)*100 };
            otcCount++;
          }
        });
      }
    }catch(e){ errMsgs.push('上櫃資料載入失敗'); console.error('TPEx fetch error', e); }
    source = '即時連線官方開放資料';
  }

  stockQuotes = newQuotes;
  stockQuotesDate = new Date().toLocaleDateString('zh-TW');
  stockQuotesLoading = false;
  if(btn) btn.disabled = false;

  const total = tseCount+otcCount;
  if(total>0){
    if(statusText) statusText.textContent = `📊 前日收盤漲跌　共 ${total} 檔（上市 ${tseCount}／上櫃 ${otcCount}）　${source}${errMsgs.length? '　⚠ '+errMsgs.join('、'):''}`;
  } else {
    if(statusText) statusText.textContent = `股價資料載入失敗：找不到 stock_quotes.json，且直接連線官方資料也被瀏覽器擋下（${errMsgs.join('、')||'未知錯誤'}）。請執行 update_stock_quotes.js 產生快照檔後再上傳。`;
  }

  // 重新渲染目前畫面以套用顏色
  try{ renderDetail(); }catch(e){ /* 尚未選取節點，略過 */ }
}

/* ---------- state ---------- */
let currentIndustry = 'D000';
let currentChildIdx = 0;
let currentLane = null;
let currentNodeIdx = 0;
let currentSubIdx = 0;
const LANE_COLORS = ['up','mid','down','quart','quint'];

/* ---------- render: industry bar ---------- */
const bar = document.getElementById('industryBar');
Object.keys(industries).forEach(code=>{
  const chip=document.createElement('div');
  chip.className='industry-chip'+(code===currentIndustry?' active':'');
  chip.textContent=industries[code].name;
  chip.onclick=()=>{ currentIndustry=code; currentChildIdx=0; currentLane=null; renderAll(); };
  chip.dataset.code=code;
  bar.appendChild(chip);
});

function getActiveData(){
  const ind=industries[currentIndustry];
  if(ind.children){
    const child=ind.children[currentChildIdx];
    return child ? child.data : null;
  }
  return ind.data;
}

function getLaneDefs(data){
  if(!data) return [];
  if(data.lanes) return data.lanes;
  return [
    {key:'upstream', label:'上游', nodes:data.upstream},
    {key:'midstream', label:'中游', nodes:data.midstream},
    {key:'downstream', label:'下游', nodes:data.downstream}
  ].filter(l=>Array.isArray(l.nodes));
}

function renderAll(){
  document.querySelectorAll('#industryBar .industry-chip').forEach(c=>{
    c.classList.toggle('active', c.dataset.code===currentIndustry);
  });

  const main=document.getElementById('main');
  main.innerHTML='';

  const ind=industries[currentIndustry];

  if(ind.children && ind.children.length){
    renderComposite(ind, main);
    return;
  }

  if(!ind.data || !ind.data.ready){
    renderPlaceholder(ind, main);
    return;
  }

  renderIndustryBody(ind.data, main);
}

function renderPlaceholder(ind, container){
  const noteHtml = ind.note ? `<br><span style="color:#b45309;">${ind.note}</span>` : '';
  const sourceLink = ind.sourceIc ? `
        <a href="https://ic.tpex.org.tw/introduce.php?ic=${ind.sourceIc}" target="_blank">
          ic.tpex.org.tw/introduce.php?ic=${ind.sourceIc}
        </a>` : '';
  const div=document.createElement('div');
  div.className='placeholder';
  div.innerHTML=`
    <strong>「${ind.name}」產業鏈資料尚未建置</strong>${noteHtml}<br>
    需要逐一向原始網站擷取，將於後續陸續補上。<br>
    ${sourceLink ? '你也可以先到原網站查看：'+sourceLink : ''}
  `;
  container.appendChild(div);
}

function renderComposite(ind, main){
  if(currentChildIdx===null || currentChildIdx>=ind.children.length || currentChildIdx<0){ currentChildIdx=0; }

  const hint=document.createElement('div');
  hint.style.cssText='font-size:13px;color:var(--muted);margin-bottom:10px;';
  hint.textContent=`「${ind.name}」為多個子產業的集合分類，請先選擇子產業：`;
  main.appendChild(hint);

  // group children by .group label if present (e.g. 綠色能源: 節能/創能/儲能/智慧系統整合)
  const hasGroups = ind.children.some(c=>c.group);
  const childBar=document.createElement('div');
  childBar.style.cssText='margin-bottom:18px;';

  if(hasGroups){
    const groupsOrder=[];
    ind.children.forEach(c=>{ if(c.group && !groupsOrder.includes(c.group)) groupsOrder.push(c.group); });
    groupsOrder.forEach(g=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;';
      const label=document.createElement('span');
      label.style.cssText='font-size:12.5px;font-weight:700;color:var(--navy);min-width:70px;';
      label.textContent=g+'：';
      row.appendChild(label);
      ind.children.forEach((c,idx)=>{
        if(c.group!==g) return;
        row.appendChild(makeChildChip(c, idx===currentChildIdx, idx));
      });
      childBar.appendChild(row);
    });
  } else {
    const row=document.createElement('div');
    row.style.cssText='display:flex;flex-wrap:wrap;gap:8px;';
    ind.children.forEach((c,idx)=>{ row.appendChild(makeChildChip(c, idx===currentChildIdx, idx)); });
    childBar.appendChild(row);
  }
  main.appendChild(childBar);

  const child=ind.children[currentChildIdx];
  const bodyWrap=document.createElement('div');
  main.appendChild(bodyWrap);

  if(child.data && child.data.ready){
    renderIndustryBody(child.data, bodyWrap);
  } else {
    renderPlaceholder({name:child.name, sourceIc:child.code}, bodyWrap);
  }
}

function makeChildChip(c, isActive, idx){
  const chip=document.createElement('div');
  chip.className='industry-chip'+(isActive?' active':'');
  chip.textContent=c.name;
  chip.onclick=()=>{ currentChildIdx=idx; currentLane=null; renderAll(); };
  return chip;
}

function renderIndustryBody(data, container){
  const laneDefs=getLaneDefs(data);
  const chain=document.createElement('div');
  chain.className='chain';
  laneDefs.forEach((ld,i)=>{
    chain.appendChild(buildLane(ld.key, ld.label, LANE_COLORS[i % LANE_COLORS.length], ld.nodes));
  });
  container.appendChild(chain);

  const detailWrap=document.createElement('div');
  detailWrap.id='detailWrap';
  container.appendChild(detailWrap);

  if(currentLane===null || !laneDefs.find(l=>l.key===currentLane)){
    currentLane=laneDefs[0].key; currentNodeIdx=0; currentSubIdx=0;
  }
  highlightActiveNode();
  renderDetail();
}

function buildLane(laneKey,label,cls,nodes){
  const lane=document.createElement('div');
  lane.className='lane '+cls;
  const head=document.createElement('div');
  head.className='lane-head';
  head.textContent=label;
  lane.appendChild(head);
  const body=document.createElement('div');
  body.className='lane-body';
  nodes.forEach((node,idx)=>{
    const btn=document.createElement('button');
    btn.className='node-btn';
    btn.dataset.lane=laneKey;
    btn.dataset.idx=idx;
    btn.innerHTML=`<span>${node.name}</span><span class="count">${node.total}家</span>`;
    btn.onclick=()=>{
      currentLane=laneKey; currentNodeIdx=idx; currentSubIdx=0;
      highlightActiveNode(); renderDetail();
    };
    body.appendChild(btn);
  });
  lane.appendChild(body);
  return lane;
}

function highlightActiveNode(){
  document.querySelectorAll('.node-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lane===currentLane && Number(b.dataset.idx)===currentNodeIdx);
  });
}

function renderDetail(){
  const data=getActiveData();
  const laneDefs=getLaneDefs(data);
  const lane=laneDefs.find(l=>l.key===currentLane);
  const node=lane.nodes[currentNodeIdx];
  const wrap=document.getElementById('detailWrap');
  wrap.innerHTML='';

  const detail=document.createElement('div');
  detail.className='detail';

  const head=document.createElement('div');
  head.className='detail-head';
  head.innerHTML=`<h2>${node.name}</h2><span class="total-badge">共 ${node.total} 家</span>`;
  detail.appendChild(head);

  const grid=document.createElement('div');
  grid.className='detail-grid';

  if(node.subcats){
    const subList=document.createElement('div');
    subList.className='subcat-list';
    node.subcats.forEach((sc,idx)=>{
      const item=document.createElement('div');
      item.className='subcat-item'+(idx===currentSubIdx?' active':'');
      item.innerHTML=`<span>${sc.name}</span><span class="n">${sc.total}</span>`;
      item.onclick=()=>{ currentSubIdx=idx; renderDetail(); };
      subList.appendChild(item);
    });
    grid.appendChild(subList);
    grid.appendChild(buildCompanies(node.subcats[currentSubIdx].groups));
  } else {
    grid.appendChild(buildCompanies(node.groups));
  }

  detail.appendChild(grid);
  wrap.appendChild(detail);
}

function buildCompanies(groupsArr){
  const wrap=document.createElement('div');
  wrap.className='companies';
  if(!groupsArr || groupsArr.length===0){
    wrap.innerHTML='<div class="empty-hint">暫無資料</div>';
    return wrap;
  }
  groupsArr.forEach(g=>{
    const gDiv=document.createElement('div');
    gDiv.className='group';
    gDiv.innerHTML=`<div class="group-title"><span class="dot"></span>${g.label}（${g.items.length}家）</div>`;
    const pills=document.createElement('div');
    pills.className='pills';
    g.items.forEach(it=>{
      const a=document.createElement('a');
      a.className='pill';
      a.href=it.url;
      a.target='_blank';
      a.rel='noopener';
      let html=it.code? `${it.name}<span class="code">${it.code}</span>` : it.name;
      if(it.code && stockQuotes[it.code]){
        const q=stockQuotes[it.code];
        const sign=q.changePercent>0?'+':'';
        const pctText=`${sign}${q.changePercent.toFixed(2)}%`;
        html+=`<span class="pct">(${pctText})</span>`;
        if(q.changePercent>0) a.classList.add('stock-up');
        else if(q.changePercent<0) a.classList.add('stock-down');
        else a.classList.add('stock-flat');
        a.title=`收盤 ${q.close}　漲跌 ${sign}${q.change}（${pctText}）　資料日期 ${stockQuotesDate||''}`;
      }
      a.innerHTML=html;
      pills.appendChild(a);
    });
    gDiv.appendChild(pills);
    wrap.appendChild(gDiv);
  });
  return wrap;
}

renderAll();
// 頁面載入後自動抓取一次股價漲跌幅（非阻塞）
setTimeout(()=>{ loadStockQuotes(); }, 300);
</script>
